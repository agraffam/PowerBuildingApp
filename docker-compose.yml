# Local / single-server deploy: persistent SQLite + Next.js
#
# Usage:
#   docker compose up --build
#   Open http://localhost:3500 (override: HOST_PORT=3000 docker compose up)
#
# First run with seed user (dev@seed.local / Seed12345678):
#   START_SEED=1 docker compose up --build
#
services:
  web:
    build: .
    ports:
      - "${HOST_PORT:-3500}:3000"
    environment:
      AUTH_SECRET: ${AUTH_SECRET:-dev-docker-auth-secret-change-me-32chars}
      # Fixed path so host DATABASE_URL (e.g. local dev.db) is never passed into the container.
      DATABASE_URL: file:/app/data/prod.db
      PB_DATA_DIR: /app/data
      # Set to 1 once after empty volume to load seed programs + dev user
      START_SEED: ${START_SEED:-0}
    volumes:
      - pb-sqlite:/app/data

volumes:
  pb-sqlite:
