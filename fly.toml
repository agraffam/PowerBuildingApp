# Fly.io template: SQLite on a mounted volume.
# See docs/DEPLOY.md (Fly.io section).

app = "powerbuilding-app"
primary_region = "iad"

[build]

[env]
  PB_DATA_DIR = "/app/data"
  PORT = "3000"

[[mounts]]
  source = "pb_data"
  destination = "/app/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpus = 1
